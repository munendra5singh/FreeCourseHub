<script>
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('id');

    if (courseId) {
        const mainSite =
            "https://munendra5singh.github.io/FreeCourseHub/SECTIONS/Courses.html?course=" +
            encodeURIComponent(courseId) +
            "&open=true";

        setTimeout(() => {
            window.location.replace(mainSite);
        }, 3000);
    } else {
        setTimeout(() => {
            window.location.replace("https://munendra5singh.github.io/FreeCourseHub/");
        }, 3000);
    }
};
</script>
    
    <style>
