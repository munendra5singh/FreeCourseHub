    <meta property="og:image" content="https://raw.githubusercontent.com/munendra5singh/FreeCourseHub/main/preview.png">

    <!-- Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FreeCourseHub",
      "url": "https://munendra5singh.github.io/FreeCourseHub/"
    }
    </script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <p style="font-weight: bold;">Loading Course Preview...</p>
        <p style="font-size: 12px; color: #6b7280;">Redirecting you to FreeCourseHub</p>
    </div>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const courseId = params.get('id');

            if (courseId) {
                const mainSite = "https://munendra5singh.github.io/FreeCourseHub/sections/Courses.html?course=" + encodeURIComponent(courseId) + "&open=true";
                setTimeout(() => {
                    window.location.replace(mainSite);
                }, 1000);
            } else {
                setTimeout(() => {
                    window.location.replace("https://munendra5singh.github.io/FreeCourseHub/");
                }, 1000);
            }
        };
    </script>
</body>
</html>
